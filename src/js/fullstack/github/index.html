<!-- an html file that shows your profile details by fetching from your profile using GitHub API. You can use JavaScript to make an API call to GitHub and display the relevant information on the page. -->

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GitHub Lite</title>
    <link href="" rel="stylesheet" />
  </head>
  <body>
    <!-- add code with tailwind css to show your github profile details -->
    <div class="container mx-auto p-4">
      <h1 class="text-2xl font-bold mb-4">GitHub Profile Details</h1>
      <div id="profile" class="bg-white shadow-md rounded-lg p-4">
        <!-- Profile details will be displayed here -->
        <p class="text-gray-500">Loading...</p>
        <p id="error" class="text-red-500 hidden">
          Failed to load profile details.
        </p>
        <div id="profile-details" class="hidden">
          <img
            id="avatar"
            class="w-24 h-24 rounded-full mb-4"
            src=""
            alt="Avatar"
          />
          <h2 id="name" class="text-xl font-semibold"></h2>
          <p id="bio" class="text-gray-700"></p>
          <p id="location" class="text-gray-500"></p>
          <a id="github-link" href="" target="_blank" class="text-blue-500"
            >View GitHub Profile</a
          >
        </div>
      </div>
    </div>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js" defer></script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const username = "pr4j3sh"; // Replace with your GitHub username
        const apiUrl = `https://api.github.com/users/${username}`;

        fetch(apiUrl)
          .then((response) => {
            if (!response.ok) {
              throw new Error("Network response was not ok");
            }
            return response.json();
          })
          .then((data) => {
            document.getElementById("avatar").src = data.avatar_url;
            document.getElementById("name").textContent =
              data.name || "No name provided";
            document.getElementById("bio").textContent =
              data.bio || "No bio available";
            document.getElementById("location").textContent =
              data.location || "No location provided";
            document.getElementById("github-link").href = data.html_url;

            document
              .getElementById("profile-details")
              .classList.remove("hidden");
            document.querySelector("#profile p").classList.add("hidden");
          })
          .catch((error) => {
            console.error("Error fetching profile details:", error);
            document.getElementById("error").classList.remove("hidden");
            document.querySelector("#profile p").classList.add("hidden");
          });
      });
    </script>
  </body>
</html>
